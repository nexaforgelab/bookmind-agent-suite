version: "3.9"

services:
  bookmind:
    build: .
    image: bookmind:1.0.0
    container_name: bookmind
    environment:
      - BOOKMIND_OUTPUT_DIR=/app/reports
      - BOOKMIND_CACHE_DIR=/app/data/cache
      - BOOKMIND_LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    stdin_open: true
    tty: true
    command: ["doctor"]
